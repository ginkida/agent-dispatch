agents:
  # Infrastructure agent — has Portainer MCP for container management
  infra:
    directory: ~/projects/infra
    description: "Infrastructure agent. MCP servers: portainer. Can check container logs, restart services, inspect Docker state."
    capabilities:
      - docker_logs
      - deploy_debug
    risky_capabilities:
      - restart_services
    timeout: 300

  # Backend agent — source code, tests, database
  backend:
    directory: ~/projects/backend
    description: "Backend API agent. Python, FastAPI, PostgreSQL. Can modify code, run tests, check migrations."
    capabilities:
      - code_debug
      - run_tests
      - inspect_migrations
    timeout: 300
    model: null  # use default model

  # Agent with permission controls — useful when you want to restrict tool access
  staging-db:
    directory: ~/projects/staging-db
    description: "Read-only database agent. Can query staging DB but not modify data."
    timeout: 120
    permission_mode: bypassPermissions  # skip permission prompts (agent runs non-interactively)
    allowed_tools:                      # only these tools are available
      - Read
      - Grep
      - Bash
    # disallowed_tools:                 # alternatively, block specific tools
    #   - Write
    #   - Edit

  # Frontend agent
  # frontend:
  #   directory: ~/projects/frontend
  #   description: "Frontend React app. Can modify components, run build, check TypeScript errors."
  #   timeout: 180

# Groups bundle related agents (code repos + capability gateways like infra)
# into a cross-project working set. A group is a *descriptive layer* — there is
# no router and no execution engine; the orchestrating session coordinates with
# the normal dispatch tools. `members` reference agents above (many-to-many: a
# shared gateway can belong to several groups). Manage via `agent-dispatch
# group add/list/inspect/update/remove`; read via the list_groups /
# inspect_group MCP tools; auto-attach the brief via dispatch(..., group="shop").
groups:
  shop:
    # description = ORCHESTRATOR-facing: how to coordinate the group.
    # Surfaced by list_groups/inspect_group, never injected into a member.
    description: "E-commerce team. After a code change: deploy via infra, then verify the checkout funnel via the analytics gateway before reporting done."
    # shared_context = MEMBER-facing FACTS, auto-prepended to group dispatches.
    shared_context: |
      Production runs in Portainer stack "shop".
      Conversion is tracked in Yandex Metrica counter 12345.
    members:
      - agent: backend
        use_for: orders/payments endpoints, migrations
      - agent: infra
        use_for: deploy, restart, container logs
      # - agent: analytics   # a shared gateway agent could also live here

settings:
  default_timeout: 300
  max_dispatch_depth: 3           # recursion protection: A -> B -> A
  max_concurrency: 5              # max parallel claude -p processes
  # default_max_budget_usd: 1.0   # flags results over this cost (budget_exceeded + hint; post-hoc, can't prevent the spend)
  # default_permission_mode: bypassPermissions  # inherited by agents without override
  # default_allowed_tools:         # inherited by agents without override
  #   - Bash
  #   - Read
  #   - Edit
  cache:
    enabled: true
    ttl: 300                       # seconds; identical (agent, task, context) requests are cached
    max_size: 1000                 # max cached entries; oldest is evicted first (FIFO)
